    <style>
        
/* Box sizing rules */
*,
*::before,
*::after {
  box-sizing: border-box;
}

/* Prevent font size inflation */
html {
  -moz-text-size-adjust: none;
  -webkit-text-size-adjust: none;
  text-size-adjust: none;
}

/* Remove default margin in favour of better control in authored CSS */
body, h1, h2, h3, h4, p,
figure, blockquote, dl, dd {
  margin-block-end: 0;
}

/* Remove list styles on ul, ol elements with a list role, which suggests default styling will be removed */
ul[role='list'],
ol[role='list'] {
  list-style: none;
}

/* Set core body defaults */
body {
  min-height: 100vh; /* fallback */
  min-height: 100svh; /* avoid mobile scroll */
  line-height: 1.5;
}

/* Set shorter line heights on headings and interactive elements */
h1, h2, h3, h4,
button, input, label {
  line-height: 1.1;
}

/* Balance text wrapping on headings */
h1, h2,
h3, h4 {
  text-wrap: balance;
}

/* A elements that don't have a class get default styles */
a:not([class]) {
  text-decoration-skip-ink: auto;
  color: currentColor;
}

/* Make images easier to work with */
img,
picture {
  max-width: 100%;
  display: block;
}

/* Inherit fonts for inputs and buttons */
input, button,
textarea, select {
  font-family: inherit;
  font-size: inherit;
}

/* Make sure textareas without a rows attribute are not tiny */
textarea:not([rows]) {
  min-height: 10em;
}

/* Anything that has been anchored to should have extra scroll margin */
:target {
  scroll-margin-block: 5ex;
}

  --size-1: clamp(1.25rem, 1.1632rem + 0.4341vw, 1.4996rem);

<body>
    <main>


<img src="./piano.jpg"/>
<h1>jennifer's piano</h1>

<input type="text" id="hiddenInput" style="opacity: 0; position: absolute;">
<div id="piano"></div>
<span id="output"></span>
<span id="output2"></span>

<blockquote><p>Bösendorfer, Upright 120/130</p></blockquote>

<p>letters are single notes in a diatonic scale, each row is an octave. numbers 1-8 are chords. spacebar is sustain. enjoy!</p>

<p>best on pc + keyboard. on mobile, <em>try</em> <a id="mobileFocus" style="text-decoration-line: underline">clicking this</a></p>




<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.5/Tone.js"></script>

<script type="module">
export const heldKeys = new Set();     // physical keys currently down
window.heldKeys = heldKeys;
window.dispatchEvent(new Event("hkReady"));
const sounding = new Set();     // notes currently playing
const response1 = await fetch("./notelist.json");
const response2 = await fetch("./keyMap.json");
const sampleMap = await response1.json();
const keyMap = await response2.json();

let sustain = false;
let mobileFlag=false;
let unidentifiedFlag=false;
let started = false;

const input = document.getElementById("hiddenInput");
document.getElementById("mobileFocus").addEventListener("click", async function() {
    input.focus();
    mobileFlag = true;
    sustain = true;

    if (!started) {
        await Tone.start();
        started = true;
        console.log("Audio unlocked");
    }
});

const sampler = new Tone.Sampler({
    urls: sampleMap,
    baseUrl: "./notes/",
    release: .5,
    volume: 1,
}).toDestination();

function swapInput() {
    input.addEventListener("input", async (e) => {
        const char = e.target.value.slice(-1).toLowerCase(); // last typed character
        e.target.value = "";
        document.getElementById("output").innerHTML = "inputlistened: " + char;  // TROUBLESHOOTING!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

        const note = keyMap[char];
        if (!note) return;

        if (!started) {
            await Tone.start();
            started = true;
        }
        sampler.triggerAttackRelease(note,"6s");
    });
}

document.addEventListener("keydown", async (e) => {
     if (!started) {
        await Tone.start();
        started = true;
    }

    if (e.code === "Space") {
        e.preventDefault();
        sustain = true;
        return;
    }

    document.getElementById("output2").innerHTML = "eventkey: " + e.key + " code: " + e.code + " which: " + e.which;  // TROUBLESHOOTING!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

    if (e.key == "Unidentified" && !unidentifiedFlag && mobileFlag) {
        unidentifiedFlag = true;
        swapInput();
    }

    const note = keyMap[e.key];

    if (!note) return;

    e.preventDefault();

    if (e.repeat || heldKeys.has(e.key)) return;

    sounding.add(e.key);
    heldKeys.add(e.key);
    sampler.triggerAttack(note);
    console.log(heldKeys);
});

document.addEventListener("keyup", (e) => {
    if (e.code === "Space" && !mobileFlag) {
        sustain = false;

        Array.from(sounding).forEach(key => {
            const note = keyMap[key];
            if (note && ! heldKeys.has(key)) {
                sampler.triggerRelease(note);
                sounding.delete(key);
            }
        });

        return;
    }

    const note = keyMap[e.key];
    if (!note) return;

    heldKeys.delete(e.key);
    
    if (!sustain) {
        sampler.triggerRelease(note);
        sounding.delete(e.key);
    }
});

window.addEventListener("blur", () => {
    sustain = false;
    sounding.clear();
    heldKeys.clear();
    sampler.releaseAll();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
<script>
    let keylength=100;
let keywidth;
let keyRatio=5;
let currentKey;
let keyZero=0; // keep this zero lol
let keyShape=[0,1,0,1,0,0,1,0,1,0,1,0];
let numKeys=72;
let keyMap;
let noteMap;
let notes=[];
let ready=false; // guard from heldKeys not ready yet

function preload() {
  keyMap = loadJSON("./keyMap.json");
  noteMap = loadJSON("./noteMap.json");
}

window.addEventListener("hkReady", () => {
  ready = true;
});

function setup() {
    
  keywidth=keylength/keyRatio;
  var canvas=createCanvas((floor(numKeys/12)*7+numKeys%12-(keyShape.slice(0,numKeys%12).reduce((total, current) => total + current, 0)))*keywidth+2, keylength+2);
  canvas.parent('piano');
  // noStroke();
  const cssAccentCol = getComputedStyle(document.documentElement)
    .getPropertyValue('--accent-color')
    .trim();
  accentCol = color(cssAccentCol || '#01030c');
  const cssMainCol = getComputedStyle(document.documentElement)
    .getPropertyValue('--main-color')
    .trim();
  mainCol = color(cssMainCol || '#fafaf6');
    const cssBGCol = getComputedStyle(document.documentElement)
    .getPropertyValue('--bg-color')
    .trim();
  bgCol = color(cssBGCol || '#000000');
  currentKey=keyZero%12;
}

function draw() {
  if (!ready) return;
  clear();
  translate(1,1)
  notes=[];
  heldKeys.forEach(key => {
            const note = keyMap[key];
            if (note) {
                if (note.constructor.name == "Array") {
                    note.forEach(note => {
                        notes.push(noteMap[note]);
                    });
                } else {
                    notes.push(noteMap[note]);
                }
            }
        });
        
  push();
  for (let i=0;i<numKeys;i+=1) {
    if (keyShape[currentKey]==0) {
        stroke(mainCol);
        if (!notes.includes(i)) {noFill()} else {fill(accentCol);stroke(accentCol)}
      rect(0,0,keywidth,keylength,0,0,keywidth/4);
      translate(keywidth,0);
    }
    currentKey=(currentKey+1)%12;
  }
  pop();
  
  currentKey=keyZero%12;
  for (let i=0;i<numKeys;i+=1) {
    if (keyShape[currentKey]==1) {
      push();
      stroke(accentCol);
      if (notes.includes(i)) {fill(accentCol)} else {fill(bgCol)}
      translate(-keywidth/3,0);
      rect(0,0,2*keywidth/3,keylength*0.6,keywidth/5);
      pop();
    }
    else {
      translate(keywidth,0);
    }
    currentKey=(currentKey+1)%12;
  }
}
</script>
